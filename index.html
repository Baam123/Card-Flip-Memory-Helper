<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Helper</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="./logo.png" rel="icon" type="image/x-icon"/>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #5d4037;
            --card-border: #f1c40f;
            --accent: #e67e22;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 5px;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .header {
            text-align: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .header h2 {
            color: var(--gold);
            margin: 10px 0 5px 0;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.8rem;
            color: #aaa;
            margin: 0;
        }

        .palette {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            background: #252525;
            padding: 10px;
            border-radius: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            border: 1px solid #333;
        }

        .icon-item {
            width: 42px;
            height: 42px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ebedee;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }

        .icon-item.selected {
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 12px var(--gold);
        }

        .grid {
            display: grid;
            gap: 5px;
            background: #3e2723;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #2b1d1d;
            width: 94vw;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 5px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 3 / 4;
            font-size: 7vw;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s ease;
        }

        .card.filled {
            background-color: #795548 !important;
            border-color: #fff;
        }

        .card.matched {
            opacity: 0.2;
            filter: grayscale(100%);
            transform: scale(0.9);
        }

        .mode-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }

        .mode-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            border-radius: 15px;
            background: #333;
            color: #ccc;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: #fff;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 0.9rem;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        /* Tùy chỉnh màu SweetAlert2 cho hợp tông Dark Mode */
        .swal2-popup {
            background: #2c3e50 !important;
            color: white !important;
            border-radius: 20px !important;
        }

        .swal2-title,
        .swal2-html-container {
            color: white !important;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>HELP REMEMBER PTG</h2>
        <p>Chọn hình rồi chọn ô để thêm &emsp; || &emsp; Chạm 2 lần để Xóa</p>
    </div>

    <div class="mode-selector" id="modeSelector">
        <button class="mode-btn" onclick="initGrid(2, 4, this)">2x4</button>
        <button class="mode-btn" onclick="initGrid(2, 5, this)">2x5</button>
        <button class="mode-btn" onclick="initGrid(2, 7, this)">2x7</button>
        <button class="mode-btn active" onclick="initGrid(2, 8, this)">2x8</button>
        <button class="mode-btn" onclick="initGrid(3, 4, this)">3x4</button>
        <button class="mode-btn" onclick="initGrid(3, 6, this)">3x6</button>
        <button class="mode-btn" onclick="initGrid(3, 8, this)">3x8</button>
    </div>

    <div class="palette" id="palette"></div>
    <div class="grid" id="grid"></div>

    <button class="reset-btn" onclick="resetAll()">
        CHƠI LẠI
    </button><br>

    <footer style="text-align:center; padding: 20px; font-size: 17px; color: var(--text3);">
        Made with ❤️ by <strong style="color: var(--text2);">QuyCo</strong>
    </footer>

    <script>
        const icons = [{ emoji: '🍷' }, { emoji: '⚓' }, { emoji: '♦️' }, { emoji: '🔍' }, { emoji: '🪄' }, { emoji: '🚢' }, { emoji: '🎵' }, { emoji: '⛵' }, { emoji: '☸️' }];
        let selectedIconIndex = 0;
        let history = {};

        function initPalette() {
            const palette = document.getElementById('palette');
            icons.forEach((icon, index) => {
                const item = document.createElement('div');
                item.className = `icon-item ${index === 0 ? 'selected' : ''}`;
                item.innerHTML = icon.emoji;
                item.onclick = () => {
                    document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedIconIndex = index;
                };
                palette.appendChild(item);
            });
        }

        function checkMatches(emoji) {
            if (!history[emoji]) return;
            const list = history[emoji];
            for (let i = 0; i < list.length; i++) {
                if (i % 2 === 1) {
                    list[i - 1].classList.add('matched');
                    list[i].classList.add('matched');
                } else {
                    list[i].classList.remove('matched');
                }
            }
        }

        function initGrid(rows, cols, btn) {
            const grid = document.getElementById('grid');
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.innerHTML = '';
            history = {};

            for (let i = 0; i < rows * cols; i++) {
                const card = document.createElement('div');
                card.className = 'card';

                card.onclick = () => {
                    const emoji = icons[selectedIconIndex].emoji;
                    if (card.innerHTML && card.innerHTML !== emoji) removeFromHistory(card);
                    if (card.innerHTML === emoji) return;

                    card.innerHTML = emoji;
                    card.classList.add('filled');
                    if (!history[emoji]) history[emoji] = [];
                    history[emoji].push(card);
                    checkMatches(emoji);
                };

                card.ondblclick = (e) => {
                    e.preventDefault();
                    removeFromHistory(card);
                    card.innerHTML = '';
                    card.classList.remove('filled', 'matched');
                };
                grid.appendChild(card);
            }
        }

        function removeFromHistory(card) {
            const emoji = card.innerHTML;
            if (emoji && history[emoji]) {
                history[emoji] = history[emoji].filter(c => c !== card);
                checkMatches(emoji);
            }
        }

        // Thay thế Confirm mặc định bằng SweetAlert2
        function resetAll() {
            Swal.fire({
                title: 'Chơi  lại',
                text: "Dữ liệu ghi nhớ hiện tại sẽ bị xóa để bắt đầu màn chơi mới!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#c0392b',
                cancelButtonColor: '#169976',
                confirmButtonText: 'Xóa ngay',
                cancelButtonText: 'Hủy'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.querySelectorAll('.card').forEach(c => {
                        c.innerHTML = '';
                        c.classList.remove('filled', 'matched');
                    });
                    history = {};
                    Swal.fire({
                        title: 'Đã làm mới!',
                        icon: 'success',
                        timer: 1000,
                        showConfirmButton: false
                    });
                }
            });
        }

        initPalette();
        initGrid(2, 8);
    </script>
</body>

</html>

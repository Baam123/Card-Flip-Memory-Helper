<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT Memory Helper - Mobile Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            /* Nền tối sâu */
            --card-bg: #5d4037;
            /* Nâu gỗ đặc trưng */
            --card-border: #8d6e63;
            /* Viền nâu sáng */
            --accent: #e67e22;
            /* Cam nhấn */
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
            /* Tối ưu hóa phản hồi chạm trên mobile */
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h2 {
            color: #f1c40f;
            margin: 5px 0;
            font-size: 1.4rem;
        }

        .header p {
            font-size: 0.9rem;
            color: #aaa;
            margin: 0;
        }

        /* Menu chọn màn chơi */
        .mode-selector {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 6px 12px;
            border: 1px solid #444;
            border-radius: 15px;
            cursor: pointer;
            background: #333;
            color: #ccc;
            font-size: 0.8rem;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            border-color: white;
            font-weight: bold;
        }

        /* Bảng chọn Icon */
        .palette {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: #252525;
            padding: 10px;
            border-radius: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
            border: 1px solid #333;
        }

        .icon-item {
            width: 45px;
            height: 45px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ebedee;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .icon-item.selected {
            border-color: #f1c40f;
            transform: scale(1.1);
            box-shadow: 0 0 10px #f1c40f;
        }

        /* Lưới thẻ bài */
        .grid-container {
            width: 100%;
            overflow-x: auto;
            /* Cho phép cuộn ngang nếu màn hình quá nhỏ */
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            gap: 6px;
            background: #3e2723;
            padding: 10px;
            border-radius: 10px;
            border: 3px solid #2b1d1d;
        }

        .card {
            width: 55px;
            height: 75px;
            background: var(--card-bg);
            border-radius: 6px;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            /* Tránh bôi đen văn bản khi nhấn đúp */
            -webkit-tap-highlight-color: transparent;
            /* Xóa màu highlight xanh khi chạm trên iOS/Android */
        }

        .card.filled {
            background-color: #795548 !important;
            border-color: #fff;
        }

        .controls {
            margin-top: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .reset-btn {
            padding: 10px 30px;
            font-size: 14px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>PT Memory Mobile 📱</h2>
        <p>1 chạm: Ghi | 2 chạm: Xóa</p>
    </div>

    <div class="mode-selector" id="modeSelector">
        <button class="mode-btn" onclick="initGrid(2, 4, this)">2x4</button>
        <button class="mode-btn" onclick="initGrid(2, 5, this)">2x5</button>
        <button class="mode-btn" onclick="initGrid(2, 7, this)">2x7</button>
        <button class="mode-btn active" onclick="initGrid(2, 8, this)">2x8</button>
        <button class="mode-btn" onclick="initGrid(3, 4, this)">3x4</button>
        <button class="mode-btn" onclick="initGrid(3, 6, this)">3x6</button>
        <button class="mode-btn" onclick="initGrid(3, 8, this)">3x8</button>
    </div>

    <div class="palette" id="palette"></div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="controls">
        <button class="reset-btn" onclick="resetAll()">LÀM MỚI TẤT CẢ</button>
    </div>

    <script>
        const icons = [
            { emoji: '🍷' }, { emoji: '⚓' }, { emoji: '💠' },
            { emoji: '🔍' }, { emoji: '🪄' }, { emoji: '🎖️' },
            { emoji: '🎵' }, { emoji: '⛵' }, { emoji: '☸️' }
        ];

        let selectedIconIndex = 0;
        const gridElement = document.getElementById('grid');

        function initPalette() {
            const palette = document.getElementById('palette');
            icons.forEach((icon, index) => {
                const item = document.createElement('div');
                item.className = `icon-item ${index === 0 ? 'selected' : ''}`;
                item.innerHTML = icon.emoji;
                item.onclick = () => {
                    document.querySelectorAll('.icon-item').forEach(i => i.classList.remove('selected'));
                    item.classList.add('selected');
                    selectedIconIndex = index;
                };
                palette.appendChild(item);
            });
        }

        function initGrid(rows, cols, btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            gridElement.style.gridTemplateColumns = `repeat(${cols}, 55px)`;
            gridElement.innerHTML = '';

            for (let i = 0; i < rows * cols; i++) {
                const card = document.createElement('div');
                card.className = 'card';

                // Nhấn 1 lần: Ghi icon
                card.onclick = () => {
                    card.innerHTML = icons[selectedIconIndex].emoji;
                    card.classList.add('filled');
                    card.style.backgroundColor = '#795548';
                };

                // Nhấn đúp: Xóa ô
                card.ondblclick = (e) => {
                    e.preventDefault();
                    card.innerHTML = '';
                    card.classList.remove('filled');
                    card.style.backgroundColor = '';
                };

                gridElement.appendChild(card);
            }
        }

        function resetAll() {
            if (confirm("Xóa hết bảng để chơi ván mới?")) {
                document.querySelectorAll('.card').forEach(c => {
                    c.innerHTML = '';
                    c.classList.remove('filled');
                    c.style.backgroundColor = '';
                });
            }
        }

        initPalette();
        initGrid(2, 8); // Mặc định
    </script>
</body>

</html>
